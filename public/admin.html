<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FindMeAJob.co.nz</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a08;--bg2:#111110;--bg3:#181816;--text:#f2efe8;--text2:#c8c4bc;--text3:#888480;--em:#10b981;--em2:#059669;--gold:#f59e0b;--red:#ef4444;--border:#2a2a28;--border2:#343430;--card:#141412;--r:8px;--rl:12px;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px}
.login-logo{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:.25rem}
.login-logo span{color:var(--em)}
.login-sub{font-size:.78rem;color:var(--text3);font-weight:600;margin-bottom:1.5rem}
label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);display:block;margin-bottom:.35rem}
input{background:#1c1c1a;border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;padding:.7rem 1rem;outline:none;width:100%;margin-bottom:.75rem}
input:focus{border-color:var(--em)}
.btn{display:flex;align-items:center;justify-content:center;background:var(--em);color:#fff;padding:.75rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.85rem;font-weight:800;border:none;cursor:pointer;width:100%;transition:background .15s}
.btn:hover{background:var(--em2)}
.err{color:#fca5a5;font-size:.78rem;font-weight:600;margin-top:.5rem;display:none}
#app{display:none;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hlogo{font-size:.95rem;font-weight:800}.hlogo span{color:var(--em)}
.hright{display:flex;align-items:center;gap:.75rem}
.badge{background:#022c22;border:1px solid rgba(16,185,129,.2);color:var(--em);font-size:.65rem;font-weight:800;padding:.2rem .55rem;border-radius:999px}
.signout{background:none;border:1px solid var(--border2);color:var(--text3);padding:.35rem .75rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.75rem;font-weight:600}
.signout:hover{color:var(--text)}
main{padding:1.5rem;max-width:1100px;margin:0 auto}
.tabs{display:flex;gap:.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--border2);color:var(--text3);padding:.4rem .9rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.78rem;font-weight:700;transition:all .15s}
.tab.active{background:var(--em);color:#fff;border-color:var(--em)}
.tab:hover:not(.active){border-color:var(--text3);color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1rem}
.stat-n{font-size:1.8rem;font-weight:900;color:var(--text);line-height:1}
.stat-l{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:.25rem}
#job-list{display:grid;gap:.5rem}
.job-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start}
.job-row.pending{border-left:3px solid var(--gold)}
.job-row.approved{border-left:3px solid var(--em)}
.job-row.rejected{border-left:3px solid var(--red);opacity:.7}
.job-row.expired{border-left:3px solid var(--text3);opacity:.75}
.jr-title{font-weight:800;font-size:.9rem;color:var(--text);margin-bottom:.2rem}
.jr-co{font-size:.75rem;font-weight:700;color:var(--gold);margin-bottom:.25rem}
.jr-meta{font-size:.72rem;color:var(--text3);font-weight:600;margin-bottom:.4rem;line-height:1.7}
.jr-dates{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem}
.jr-date{font-size:.7rem;font-weight:700;padding:.18rem .55rem;border-radius:999px;display:inline-flex;align-items:center;gap:.25rem}
.jr-date.submitted{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.jr-date.approved-date{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--em)}
.jr-date.expires-ok{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);color:var(--em)}
.jr-date.expires-soon{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold)}
.jr-date.expires-now{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.pills{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem}
.status-pill{display:inline-flex;align-items:center;padding:.18rem .55rem;border-radius:999px;font-size:.62rem;font-weight:800;text-transform:uppercase}
.sp-pending{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold)}
.sp-approved{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--em)}
.sp-rejected{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.sp-featured{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gold)}
.sp-expired{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.actions{display:flex;flex-direction:column;gap:.35rem;flex-shrink:0;align-items:flex-end}
.action-row{display:flex;gap:.35rem;flex-wrap:wrap;justify-content:flex-end}
.abtn{border:none;padding:.35rem .7rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.abtn-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--em)}
.abtn-ok:hover{background:var(--em);color:#fff}
.abtn-rej{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.abtn-rej:hover{background:var(--red);color:#fff}
.abtn-feat{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold)}
.abtn-feat:hover{background:var(--gold);color:#000}
.abtn-relist{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--em)}
.abtn-relist:hover{background:var(--em);color:#fff}
.abtn-del{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.abtn-del:hover{background:rgba(239,68,68,.1);border-color:var(--red);color:#fca5a5}
.jr-desc{font-size:.78rem;color:var(--text2);line-height:1.6;margin-bottom:.5rem}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:.85rem;font-weight:600}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.refresh-txt{font-size:.72rem;color:var(--text3);font-weight:600}
.rbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.35rem .75rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.75rem;font-weight:700}
.rbtn:hover{border-color:var(--em);color:var(--em)}
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px)}
#confirm-modal.show{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.75rem;width:100%;max-width:380px;text-align:center}
.confirm-icon{font-size:2rem;margin-bottom:.75rem}
.confirm-title{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:.5rem}
.confirm-sub{font-size:.82rem;color:var(--text3);margin-bottom:1.5rem;line-height:1.65;font-weight:500}
.confirm-btns{display:flex;gap:.5rem}
.confirm-cancel{flex:1;padding:.75rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.confirm-ok{flex:1;padding:.75rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;background:var(--red);border:none;color:#fff}
.confirm-cancel:hover{border-color:var(--text3);color:var(--text)}
.confirm-ok:hover{background:#dc2626}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.job-row{grid-template-columns:1fr}.actions{flex-direction:row;flex-wrap:wrap;align-items:flex-start}}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">FindMe<span>AJob</span>.co.nz</div>
    <div class="login-sub">Admin Panel</div>
    <label>Password</label>
    <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password">
    <button class="btn" id="btn-login" type="button">Sign In</button>
    <div class="err" id="login-err">Incorrect password.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="hlogo">FindMe<span>AJob</span> <span style="font-size:.7rem;color:var(--text3);font-weight:600">Admin</span></div>
    <div class="hright">
      <span class="badge" id="pending-badge">0 pending</span>
      <button class="signout" id="btn-signout" type="button">Sign out</button>
    </div>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Total listings</div></div>
      <div class="stat"><div class="stat-n" id="st-pending" style="color:var(--gold)">0</div><div class="stat-l">Pending review</div></div>
      <div class="stat"><div class="stat-n" id="st-approved" style="color:var(--em)">0</div><div class="stat-l">Live now</div></div>
      <div class="stat"><div class="stat-n" id="st-expired" style="color:var(--text3)">0</div><div class="stat-l">Expired</div></div>
    </div>
    <div class="refresh-bar">
      <div class="tabs">
        <button class="tab active" data-tab="pending" type="button">Pending</button>
        <button class="tab" data-tab="approved" type="button">Live</button>
        <button class="tab" data-tab="rejected" type="button">Rejected</button>
        <button class="tab" data-tab="expired" type="button">Expired</button>
        <button class="tab" data-tab="all" type="button">All</button>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="refresh-txt" id="last-refresh">Never refreshed</span>
        <button class="rbtn" id="btn-refresh" type="button">&#8635; Refresh</button>
      </div>
    </div>
    <div id="job-list"></div>
  </main>
</div>

<div id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">Delete this listing?</div>
    <div class="confirm-sub" id="confirm-sub">This will permanently remove the listing and cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirm-cancel" type="button">Cancel</button>
      <button class="confirm-ok" id="confirm-ok" type="button">Yes, delete permanently</button>
    </div>
  </div>
</div>

<script>
var pw='', allJobs=[], currentTab='pending', refreshTimer=null, pendingDeleteId=null;
var PLAN_DAYS = { free:30, basic:60, pro:90 };

function getDaysLeft(job) {
  var start = job.approvedAt || job.submitted;
  if (!start) return null;
  var days = PLAN_DAYS[job.plan] || 30;
  var expiry = new Date(new Date(start).getTime() + days*24*60*60*1000);
  return { days: Math.ceil((expiry - new Date()) / (1000*60*60*24)), expiry: expiry };
}
function fmtDate(d) { return new Date(d).toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'}); }
function isExpired(j) { if(j.status!=='approved')return false; var i=getDaysLeft(j); return i&&i.days<=0; }

document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('btn-signout').addEventListener('click',function(){pw='';document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none';clearInterval(refreshTimer);});
document.getElementById('btn-refresh').addEventListener('click',loadJobs);
document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});this.classList.add('active');currentTab=this.dataset.tab;renderJobs();});});
document.getElementById('confirm-cancel').addEventListener('click',function(){document.getElementById('confirm-modal').classList.remove('show');pendingDeleteId=null;});
document.getElementById('confirm-ok').addEventListener('click',function(){document.getElementById('confirm-modal').classList.remove('show');if(pendingDeleteId){execAction('delete',pendingDeleteId);pendingDeleteId=null;}});

async function doLogin(){
  var p=document.getElementById('pw').value; if(!p)return;
  var r=await fetch('/api/admin?action=list&password='+encodeURIComponent(p));
  if(r.status===401){document.getElementById('login-err').style.display='block';return;}
  var d=await r.json();
  if(d.jobs!==undefined){pw=p;document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';document.getElementById('login-err').style.display='none';allJobs=d.jobs;updateStats();renderJobs();refreshTimer=setInterval(loadJobs,30000);document.getElementById('last-refresh').textContent='Refreshed just now';}
  else{document.getElementById('login-err').style.display='block';}
}

async function loadJobs(){
  var r=await fetch('/api/admin?action=list&password='+encodeURIComponent(pw));
  if(!r.ok)return; var d=await r.json(); allJobs=d.jobs||[]; updateStats(); renderJobs();
  document.getElementById('last-refresh').textContent='Refreshed '+new Date().toLocaleTimeString('en-NZ');
}

function updateStats(){
  var p=allJobs.filter(function(j){return j.status==='pending';}).length;
  var a=allJobs.filter(function(j){return j.status==='approved'&&!isExpired(j);}).length;
  var e=allJobs.filter(function(j){return isExpired(j);}).length;
  document.getElementById('st-total').textContent=allJobs.length;
  document.getElementById('st-pending').textContent=p;
  document.getElementById('st-approved').textContent=a;
  document.getElementById('st-expired').textContent=e;
  document.getElementById('pending-badge').textContent=p+' pending';
}

function renderJobs(){
  var filtered=allJobs.filter(function(j){
    if(currentTab==='all')return true;
    if(currentTab==='expired')return isExpired(j);
    if(currentTab==='approved')return j.status==='approved'&&!isExpired(j);
    return j.status===currentTab;
  });
  var list=document.getElementById('job-list');
  if(!filtered.length){list.innerHTML='<div class="empty">No listings in this category.</div>';return;}
  list.innerHTML='';
  filtered.forEach(function(j){
    var expired=isExpired(j);
    var row=document.createElement('div');
    row.className='job-row '+(expired?'expired':(j.status||''));

    // Pills - status and featured are separate, never overlap
    var statusLabel=expired?'expired':j.status;
    var statusCls=expired?'sp-expired':'sp-'+j.status;
    var pills='<div class="pills"><span class="status-pill '+statusCls+'">'+statusLabel+'</span>';
    if(j.featured&&!expired)pills+='<span class="status-pill sp-featured">⭐ Featured</span>';
    pills+='</div>';

    // Date pills
    var dates='<div class="jr-dates">';
    if(j.submitted)dates+='<span class="jr-date submitted">📅 '+fmtDate(j.submitted)+'</span>';
    if(j.approvedAt)dates+='<span class="jr-date approved-date">✓ Live from '+fmtDate(j.approvedAt)+'</span>';
    if(j.status==='approved'){
      var info=getDaysLeft(j);
      if(info){
        var cls=info.days<=0?'expires-now':info.days<=7?'expires-soon':'expires-ok';
        var label=info.days<=0?'Expired '+fmtDate(info.expiry):info.days<=7?'⏰ Expires in '+info.days+'d':'📆 Expires '+fmtDate(info.expiry)+' ('+info.days+'d left)';
        dates+='<span class="jr-date '+cls+'">'+label+'</span>';
      }
    }
    dates+='</div>';

    // Action buttons
    var act='<div class="actions"><div class="action-row">';
    if(j.status==='pending'){act+='<button class="abtn abtn-ok" data-id="'+j.id+'" data-action="approve" type="button">✓ Approve</button><button class="abtn abtn-rej" data-id="'+j.id+'" data-action="reject" type="button">✕ Reject</button>';}
    if(j.status==='approved'&&!expired){act+='<button class="abtn abtn-feat" data-id="'+j.id+'" data-action="feature" type="button">'+(j.featured?'★ Unfeature':'☆ Feature')+'</button>';}
    if(j.status==='rejected'){act+='<button class="abtn abtn-ok" data-id="'+j.id+'" data-action="approve" type="button">✓ Approve</button>';}
    if(expired){act+='<button class="abtn abtn-relist" data-id="'+j.id+'" data-action="relist" type="button">↺ Re-list</button>';}
    act+='</div><div class="action-row"><button class="abtn abtn-del" data-id="'+j.id+'" data-title="'+(j.title||'').replace(/"/g,'')+'" data-action="delete" type="button">🗑 Delete</button></div></div>';

    row.innerHTML=
      '<div>'+
      '<div class="jr-title">'+(j.title||'')+'</div>'+
      '<div class="jr-co">'+(j.company||'')+'</div>'+
      '<div class="jr-meta">'+(j.location||'')+' &middot; '+(j.category||'')+' &middot; '+(j.type||'')+' &middot; '+(j.salary||'')+' &middot; <a href="mailto:'+j.email+'" style="color:var(--em);text-decoration:none">'+j.email+'</a> &middot; Plan: <strong style="color:var(--text)">'+(j.plan||'free')+'</strong></div>'+
      dates+pills+
      '<div class="jr-desc">'+(j.description||'').substring(0,200)+'...</div>'+
      (j.requirements?'<div style="font-size:.72rem;color:var(--text3);margin-bottom:.3rem;margin-top:.3rem"><strong style="color:var(--text2)">Requirements:</strong> '+j.requirements+'</div>':'')+
      (j.why?'<div style="font-size:.72rem;color:var(--text3);margin-top:.2rem"><strong style="color:var(--text2)">Why work here:</strong> '+j.why+'</div>':'')+
      '</div>'+act;
    list.appendChild(row);
  });

  document.querySelectorAll('.abtn[data-action]').forEach(function(b){
    b.addEventListener('click',function(){
      var action=this.dataset.action, id=this.dataset.id;
      if(action==='delete'){
        pendingDeleteId=id;
        document.getElementById('confirm-sub').textContent='You are about to permanently delete "'+this.dataset.title+'". This cannot be undone.';
        document.getElementById('confirm-modal').classList.add('show');
      } else { execAction(action,id); }
    });
  });
}

async function execAction(action,id){
  var r=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,password:pw,id})});
  var d=await r.json();
  if(d.success){loadJobs();}else{alert('Error: '+(d.error||'Unknown'));}
}
</script>
</body>
</html>
