<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FindMeAJob.co.nz</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a08;--bg2:#111110;--bg3:#181816;--text:#f2efe8;--text2:#c8c4bc;--text3:#888480;--em:#10b981;--em2:#059669;--gold:#f59e0b;--red:#ef4444;--border:#2a2a28;--border2:#343430;--card:#141412;--r:8px;--rl:12px;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px}
.login-logo{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:.25rem}
.login-logo span{color:var(--em)}
.login-sub{font-size:.78rem;color:var(--text3);font-weight:600;margin-bottom:1.5rem}
label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);display:block;margin-bottom:.35rem}
input{background:#1c1c1a;border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;font-size:14px;padding:.7rem 1rem;outline:none;width:100%;margin-bottom:.75rem}
input:focus{border-color:var(--em)}
.btn{display:flex;align-items:center;justify-content:center;background:var(--em);color:#fff;padding:.75rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.85rem;font-weight:800;border:none;cursor:pointer;width:100%;transition:background .15s}
.btn:hover{background:var(--em2)}
.err{color:#fca5a5;font-size:.78rem;font-weight:600;margin-top:.5rem;display:none}
#app{display:none;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hlogo{font-size:.95rem;font-weight:800}.hlogo span{color:var(--em)}
.hright{display:flex;align-items:center;gap:.75rem}
.badge{background:var(--em3,#022c22);border:1px solid rgba(16,185,129,.2);color:var(--em);font-size:.65rem;font-weight:800;padding:.2rem .55rem;border-radius:999px}
.signout{background:none;border:1px solid var(--border2);color:var(--text3);padding:.35rem .75rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.75rem;font-weight:600}
.signout:hover{color:var(--text)}
main{padding:1.5rem;max-width:1100px;margin:0 auto}
.tabs{display:flex;gap:.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{background:none;border:1px solid var(--border2);color:var(--text3);padding:.4rem .9rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.78rem;font-weight:700;transition:all .15s}
.tab.active{background:var(--em);color:#fff;border-color:var(--em)}
.tab:hover:not(.active){border-color:var(--text3);color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.25rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1rem}
.stat-n{font-size:1.8rem;font-weight:900;color:var(--text);line-height:1}
.stat-l{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:.25rem}
#job-list{display:grid;gap:.5rem}
.job-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start}
.job-row.pending{border-left:3px solid var(--gold)}
.job-row.approved{border-left:3px solid var(--em)}
.job-row.rejected{border-left:3px solid var(--red);opacity:.6}
.jr-title{font-weight:800;font-size:.9rem;color:var(--text);margin-bottom:.2rem}
.jr-co{font-size:.75rem;font-weight:700;color:var(--gold);margin-bottom:.3rem}
.jr-meta{font-size:.72rem;color:var(--text3);font-weight:600;margin-bottom:.5rem}
.jr-desc{font-size:.78rem;color:var(--text2);line-height:1.6;margin-bottom:.5rem;max-height:60px;overflow:hidden}
.jr-desc.expanded{max-height:none}
.status-pill{display:inline-flex;align-items:center;padding:.18rem .55rem;border-radius:999px;font-size:.62rem;font-weight:800;text-transform:uppercase;margin-right:.3rem}
.sp-pending{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold)}
.sp-approved{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--em)}
.sp-rejected{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.sp-featured{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gold)}
.actions{display:flex;gap:.35rem;flex-wrap:wrap;flex-shrink:0}
.abtn{border:none;padding:.35rem .7rem;border-radius:var(--r);font-family:'Cabinet Grotesk',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.abtn-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--em)}
.abtn-ok:hover{background:var(--em);color:#fff}
.abtn-rej{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.abtn-rej:hover{background:var(--red);color:#fff}
.abtn-feat{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold)}
.abtn-feat:hover{background:var(--gold);color:#000}
.abtn-del{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.abtn-del:hover{background:var(--red);border-color:var(--red);color:#fff}
.abtn-exp{background:none;border:none;color:var(--text3);font-size:.68rem;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;padding:0;font-weight:600}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:.85rem;font-weight:600}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.refresh-txt{font-size:.72rem;color:var(--text3);font-weight:600}
.rbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:.35rem .75rem;border-radius:var(--r);cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;font-size:.75rem;font-weight:700}
.rbtn:hover{border-color:var(--em);color:var(--em)}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.job-row{grid-template-columns:1fr}.actions{flex-direction:row}}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">FindMe<span>AJob</span>.co.nz</div>
    <div class="login-sub">Admin Panel</div>
    <label>Password</label>
    <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password">
    <button class="btn" id="btn-login" type="button">Sign In</button>
    <div class="err" id="login-err">Incorrect password.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="hlogo">FindMe<span>AJob</span> <span style="font-size:.7rem;color:var(--text3);font-weight:600">Admin</span></div>
    <div class="hright">
      <span class="badge" id="pending-badge">0 pending</span>
      <button class="signout" id="btn-signout" type="button">Sign out</button>
    </div>
  </header>
  <main>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Total listings</div></div>
      <div class="stat"><div class="stat-n" id="st-pending" style="color:var(--gold)">0</div><div class="stat-l">Pending review</div></div>
      <div class="stat"><div class="stat-n" id="st-approved" style="color:var(--em)">0</div><div class="stat-l">Approved / live</div></div>
      <div class="stat"><div class="stat-n" id="st-rejected" style="color:#fca5a5">0</div><div class="stat-l">Rejected</div></div>
    </div>
    <div class="refresh-bar">
      <div class="tabs">
        <button class="tab active" data-tab="pending" type="button">Pending</button>
        <button class="tab" data-tab="approved" type="button">Approved</button>
        <button class="tab" data-tab="rejected" type="button">Rejected</button>
        <button class="tab" data-tab="all" type="button">All</button>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="refresh-txt" id="last-refresh">Never refreshed</span>
        <button class="rbtn" id="btn-refresh" type="button">&#8635; Refresh</button>
      </div>
    </div>
    <div id="job-list"></div>
  </main>
</div>

<script>
var pw='',allJobs=[],currentTab='pending',refreshTimer=null;

document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('btn-signout').addEventListener('click',function(){pw='';document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none';clearInterval(refreshTimer);});
document.getElementById('btn-refresh').addEventListener('click',loadJobs);
document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});this.classList.add('active');currentTab=this.dataset.tab;renderJobs();});});

async function doLogin(){
  var p=document.getElementById('pw').value;
  if(!p){return;}
  var r=await fetch('/api/admin?action=list&password='+encodeURIComponent(p));
  if(r.status===401){document.getElementById('login-err').style.display='block';return;}
  var d=await r.json();
  if(d.jobs!==undefined){
    pw=p;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('login-err').style.display='none';
    allJobs=d.jobs;updateStats();renderJobs();
    refreshTimer=setInterval(loadJobs,30000);
    document.getElementById('last-refresh').textContent='Refreshed just now';
  }else{document.getElementById('login-err').style.display='block';}
}

async function loadJobs(){
  var r=await fetch('/api/admin?action=list&password='+encodeURIComponent(pw));
  if(!r.ok)return;
  var d=await r.json();
  allJobs=d.jobs||[];updateStats();renderJobs();
  var now=new Date();document.getElementById('last-refresh').textContent='Refreshed '+now.toLocaleTimeString('en-NZ');
}

function updateStats(){
  var pending=allJobs.filter(function(j){return j.status==='pending';}).length;
  var approved=allJobs.filter(function(j){return j.status==='approved';}).length;
  var rejected=allJobs.filter(function(j){return j.status==='rejected';}).length;
  document.getElementById('st-total').textContent=allJobs.length;
  document.getElementById('st-pending').textContent=pending;
  document.getElementById('st-approved').textContent=approved;
  document.getElementById('st-rejected').textContent=rejected;
  document.getElementById('pending-badge').textContent=pending+' pending';
}

function renderJobs(){
  var filtered=allJobs.filter(function(j){return currentTab==='all'||j.status===currentTab;});
  var list=document.getElementById('job-list');
  if(!filtered.length){list.innerHTML='<div class="empty">No listings in this category.</div>';return;}
  list.innerHTML='';
  filtered.forEach(function(j){
    var row=document.createElement('div');
    row.className='job-row '+(j.status||'');
    var submitted=j.submitted?new Date(j.submitted).toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'}):'Unknown';
    var pills='<span class="status-pill sp-'+j.status+'">'+j.status+'</span>';
    if(j.featured)pills+='<span class="status-pill sp-featured">⭐ Featured</span>';
    row.innerHTML='<div>'+
      '<div class="jr-title">'+j.title+'</div>'+
      '<div class="jr-co">'+j.company+'</div>'+
      '<div class="jr-meta">'+j.location+' &middot; '+j.category+' &middot; '+j.type+' &middot; '+j.salary+' &middot; Submitted '+submitted+' &middot; <a href="mailto:'+j.email+'" style="color:var(--em);text-decoration:none">'+j.email+'</a> &middot; Plan: '+j.plan+'</div>'+
      pills+
      '<div class="jr-desc" id="desc-'+j.id+'">'+(j.description||'')+'</div>'+
      (j.requirements?'<div style="font-size:.72rem;color:var(--text3);margin-bottom:.3rem"><strong style="color:var(--text2)">Requirements:</strong> '+j.requirements+'</div>':'')+
      (j.why?'<div style="font-size:.72rem;color:var(--text3)"><strong style="color:var(--text2)">Why work here:</strong> '+j.why+'</div>':'')+
      '</div>'+
      '<div class="actions">'+
      (j.status==='pending'?'<button class="abtn abtn-ok" data-id="'+j.id+'" data-action="approve" type="button">✓ Approve</button><button class="abtn abtn-rej" data-id="'+j.id+'" data-action="reject" type="button">✕ Reject</button>':'')+
      (j.status==='approved'?'<button class="abtn abtn-feat" data-id="'+j.id+'" data-action="feature" type="button">'+(j.featured?'★ Unfeature':'☆ Feature')+'</button>':'')+
      (j.status==='rejected'?'<button class="abtn abtn-ok" data-id="'+j.id+'" data-action="approve" type="button">✓ Approve</button>':'')+
      '<button class="abtn abtn-del" data-id="'+j.id+'" data-action="delete" type="button">🗑 Delete</button>'+
      '</div>';
    list.appendChild(row);
  });
  document.querySelectorAll('.abtn[data-action]').forEach(function(b){
    b.addEventListener('click',function(){doAction(this.dataset.action,this.dataset.id);});
  });
}

async function doAction(action,id){
  if(action==='delete'&&!confirm('Delete this listing permanently?'))return;
  var r=await fetch('/api/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,password:pw,id})});
  var d=await r.json();
  if(d.success){loadJobs();}else{alert('Error: '+(d.error||'Unknown'));}
}
</script>
</body>
</html>
