<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;padding:2rem;background:#111;color:#fff}
.chip{background:#1a1a1a;border:1px solid #333;color:#888;padding:.5rem 1rem;border-radius:999px;font-size:1rem;cursor:pointer;margin:.3rem;display:inline-block;min-height:44px;line-height:44px}
.chip:active{background:green;color:#fff}
.result{margin-top:1rem;font-size:1.2rem;color:lime}
</style>
</head>
<body>
<h2>Chip Test</h2>
<p>Tap a chip. If it works, the number below goes up.</p>
<div>
  <button class="chip" data-skill="Coding">Coding</button>
  <button class="chip" data-skill="Sales">Sales</button>
  <button class="chip" data-skill="Teaching">Teaching</button>
</div>
<div class="result" id="result">Taps: 0</div>
<script>
var count = 0;
document.querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    count++;
    document.getElementById('result').textContent = 'Taps: ' + count + ' - Last: ' + this.getAttribute('data-skill');
  });
});
</script>
</body>
</html>
